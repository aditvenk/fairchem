# FastCSP conformer-generation example
#
# Reads molecules.csv (same file the main workflow reads) and writes
# per-molecule XYZ conformers to <root>/conformers/<name>/. Confgen only
# reads the ``name`` + ``smiles`` columns; the extras (``conformers_path``,
# ``refcode``, ``z``, ``spg``) are ignored here and used later by
# ``fastcsp_config.yaml``.
#
# The optional ``select_for_fastcsp`` column controls how many conformers
# are mirrored into ``<root>/conformers/<name>/`` (relaxed first, then
# generated). Without it, only ``conformers_generated/`` and
# ``conformers_relaxed/`` are produced.
#
# Run:
#   fastcsp-confgen -c example/confgen_config.yaml
#
# Replace <PROJECT_ROOT> with the absolute path where you want outputs
# to land. Everything under that root is workflow-managed.

root: <PROJECT_ROOT>
molecules: molecules.csv        # single CSV shared with the fastcsp workflow;
                                # confgen reads name + smiles and ignores the
                                # other columns.

rdkit:
  initial_pool_size: 40          # RDKit ETKDG seed pool
  seed: 42
  rmsd_thresh: 0.25               # Butina cluster radius (Angstrom)
  cluster_energy_thresh: 1.5      # kJ/mol; pairs farther apart are skipped
  include_hydrogens: true         # RMSD over all atoms (false = heavy only)
  output_format: xyz              # fastcsp reads xyz/sdf/mol

# ML relaxation of RDKit conformers with UMA
relax:
  calculator: uma_sm_1p1_omol     # omol (molecules) task, not omc
  optimizer: BFGS
  fmax: 0.05                      # eV/A
  max_steps: 100
  write_traj: false
  energy_window: 40.0             # kJ/mol cap on final relaxed pool

# SLURM per-molecule array job. Uncomment/adjust for your cluster.
slurm:
  timeout_min: 240
  gpus_per_node: 1
  cpus_per_task: 8
  mem_gb: 32
  # partition: <YOUR_PARTITION>
  # array_parallelism: 8
